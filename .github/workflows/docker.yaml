name: Docker Build and Publish

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: docker.io
  IMAGE_NAME: intabiafusion/platform-docs

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract version info
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            # For tags like v1.0.0
            VERSION=${GITHUB_REF#refs/tags/v}
            MAJOR_MINOR=$(echo $VERSION | cut -d. -f1,2)
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "major_minor=$MAJOR_MINOR" >> $GITHUB_OUTPUT
            echo "is_tag=true" >> $GITHUB_OUTPUT
            echo "📦 Building version: $VERSION"
            echo "🏷️ Additional tags: $MAJOR_MINOR, latest"
          elif [[ "${{ github.ref }}" == refs/heads/main ]]; then
            # For main branch
            VERSION="latest"
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
            echo "📦 Building latest version"
          else
            # For other branches
            VERSION=${{ github.ref_name }}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
            echo "is_tag=false" >> $GITHUB_OUTPUT
            echo "📦 Building branch: $VERSION"
          fi

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_ACCESS_TOKEN }}

      - name: Build Docker image
        run: |
          chmod +x build.sh
          ./build.sh ${{ steps.version.outputs.version }}

      - name: Push Docker image
        if: github.event_name != 'pull_request'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          
          echo "=== Pushing Docker images ==="
          echo "Pushing: $IMAGE_NAME:$VERSION"
          docker push "$IMAGE_NAME:$VERSION"
          
          # Tag and push additional versions for tags
          if [[ "${{ steps.version.outputs.is_tag }}" == "true" ]]; then
            MAJOR_MINOR=${{ steps.version.outputs.major_minor }}
            
            echo "Tagging: $VERSION → $MAJOR_MINOR"
            docker tag "$IMAGE_NAME:$VERSION" "$IMAGE_NAME:$MAJOR_MINOR"
            docker push "$IMAGE_NAME:$MAJOR_MINOR"
            
            echo "Tagging: $VERSION → latest"
            docker tag "$IMAGE_NAME:$VERSION" "$IMAGE_NAME:latest"
            docker push "$IMAGE_NAME:latest"
          fi
          
          echo ""
          echo "=== Published Images ==="
          docker images "$IMAGE_NAME" --format "table {{.Repository}}:{{.Tag}}\t{{.Size}}\t{{.CreatedSince}}"

      - name: Show image digest
        if: github.event_name != 'pull_request' && steps.version.outputs.is_tag == 'true'
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DIGEST=$(docker inspect "$IMAGE_NAME:$VERSION" --format='{{index .RepoDigests 0}}')
          echo "📋 Image Digest: $DIGEST"
          echo ""
          echo "💡 Use this digest in your deployments:"
          echo "   docker pull $IMAGE_NAME@$DIGEST"

  test:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request'

    steps:
      - name: Test container
        run: |
          VERSION=${{ needs.build-and-push.outputs.version }}
          echo "🧪 Testing container $IMAGE_NAME:$VERSION"
          
          docker run -d --name test-container -p 8080:80 "$IMAGE_NAME:$VERSION"
          sleep 5
          
          # Test main page
          if curl -sf http://localhost:8080/docs/ > /dev/null; then
            echo "✅ Main page is accessible"
          else
            echo "❌ Main page failed"
            exit 1
          fi
          
          # Test Brotli compression
          BROTLI_SIZE=$(curl -s -o /dev/null -w "%{size_download}" -H "Accept-Encoding: br" http://localhost:8080/docs/)
          if [ "$BROTLI_SIZE" -gt 0 ]; then
            echo "✅ Brotli compression is working ($BROTLI_SIZE bytes)"
          else
            echo "❌ Brotli compression failed"
            exit 1
          fi
          
          docker rm -f test-container
          echo "✅ All tests passed"
